name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quizapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run TypeScript compile check
        working-directory: server
        run: npx tsc --noEmit

      - name: Run database migrations
        working-directory: server
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: quizapp_test
          DB_TEST_NAME: quizapp_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          npm install -g pg
          npx ts-node src/db/runMigrations.ts

      - name: Seed test database
        working-directory: server
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_TEST_NAME: quizapp_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: npx ts-node src/db/runSeed.ts

      - name: Run tests
        working-directory: server
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_TEST_NAME: quizapp_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test_secret_for_ci
        run: npm test

  typecheck-client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: TypeScript check client
        working-directory: client
        run: npx tsc --noEmit